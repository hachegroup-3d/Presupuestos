    <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"es\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Propuesta Digital — H Group</title>\n<style>\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  :root {\n    --accent: #E63B22;\n    --accent-soft: #FBE9E5;\n    --ink: #1D1D1F;\n    --ink-2: #424245;\n    --gray: #6E6E73;\n    --gray-2: #86868B;\n    --line: #D2D2D7;\n    --line-soft: #E8E8ED;\n    --bg: #FFFFFF;\n    --bg-2: #F5F5F7;\n    --bg-3: #FAFAFB;\n  }\n\n  html { scroll-behavior: smooth; }\n\n  body {\n    background: var(--bg);\n    color: var(--ink);\n    font-family: -apple-system, BlinkMacSystemFont, \"SF Pro Display\", \"SF Pro Text\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n    font-size: 17px;\n    line-height: 1.5;\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n    letter-spacing: -0.01em;\n  }\n\n  .wrap {\n    max-width: 1080px;\n    margin: 0 auto;\n    padding: 0 32px;\n  }\n\n  /* ── NAV ── */\n  .nav {\n    position: sticky;\n    top: 0;\n    z-index: 50;\n    background: rgba(255,255,255,0.82);\n    backdrop-filter: saturate(180%) blur(20px);\n    -webkit-backdrop-filter: saturate(180%) blur(20px);\n    border-bottom: 1px solid var(--line-soft);\n  }\n  .nav-inner {\n    max-width: 1080px;\n    margin: 0 auto;\n    padding: 14px 32px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n  }\n  .nav-brand {\n    display: flex;\n    align-items: center;\n  }\n  .nav-brand img {\n    height: 28px;\n    width: auto;\n    display: block;\n  }\n  .nav-links {\n    display: flex;\n    gap: 28px;\n  }\n  .nav-links a {\n    font-size: 13px;\n    color: var(--ink-2);\n    text-decoration: none;\n    font-weight: 400;\n    transition: color 0.2s;\n  }\n  .nav-links a:hover { color: var(--accent); }\n\n  /* ── HERO ── */\n  .hero {\n    padding: 140px 0 120px;\n    text-align: center;\n    background: var(--bg);\n    position: relative;\n  }\n  .hero-eyebrow {\n    font-size: 15px;\n    color: var(--accent);\n    font-weight: 500;\n    letter-spacing: -0.005em;\n    margin-bottom: 24px;\n  }\n  .hero-title {\n    font-size: clamp(48px, 7.5vw, 88px);\n    font-weight: 700;\n    line-height: 1.05;\n    letter-spacing: -0.035em;\n    color: var(--ink);\n    margin-bottom: 24px;\n    max-width: 900px;\n    margin-left: auto;\n    margin-right: auto;\n  }\n  .hero-title .accent {\n    background: linear-gradient(90deg, var(--accent) 0%, #FF6A4D 100%);\n    -webkit-background-clip: text;\n    background-clip: text;\n    -webkit-text-fill-color: transparent;\n  }\n  .hero-sub {\n    font-size: clamp(20px, 2.4vw, 26px);\n    font-weight: 400;\n    line-height: 1.35;\n    color: var(--gray);\n    max-width: 680px;\n    margin: 0 auto 56px;\n    letter-spacing: -0.015em;\n  }\n  .hero-meta {\n    display: inline-flex;\n    align-items: center;\n    gap: 0;\n    border: 1px solid var(--line);\n    border-radius: 999px;\n    padding: 6px;\n    background: var(--bg);\n  }\n  .hero-meta-item {\n    padding: 10px 22px;\n    font-size: 13px;\n    color: var(--ink-2);\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    border-right: 1px solid var(--line-soft);\n  }\n  .hero-meta-item:last-child { border-right: none; }\n  .hero-meta-item strong {\n    font-weight: 600;\n    color: var(--ink);\n  }\n  .hero-meta-item .label {\n    color: var(--gray-2);\n    font-size: 12px;\n  }\n\n  /* ── SECTION ── */\n  .section {\n    padding: 120px 0;\n    background: var(--bg);\n  }\n  .section.alt { background: var(--bg-2); }\n\n  .section-head {\n    text-align: center;\n    margin-bottom: 72px;\n  }\n  .section-tag {\n    display: inline-block;\n    font-size: 13px;\n    font-weight: 500;\n    color: var(--accent);\n    background: var(--accent-soft);\n    padding: 6px 14px;\n    border-radius: 999px;\n    margin-bottom: 20px;\n    letter-spacing: 0;\n  }\n  .section-title {\n    font-size: clamp(36px, 5vw, 56px);\n    font-weight: 700;\n    line-height: 1.08;\n    letter-spacing: -0.03em;\n    color: var(--ink);\n    margin-bottom: 20px;\n    max-width: 760px;\n    margin-left: auto;\n    margin-right: auto;\n  }\n  .section-lead {\n    font-size: 19px;\n    line-height: 1.55;\n    color: var(--gray);\n    max-width: 620px;\n    margin: 0 auto;\n    letter-spacing: -0.01em;\n  }\n\n  /* ── SCOPE CARDS ── */\n  .scope-grid {\n    display: grid;\n    grid-template-columns: repeat(2, 1fr);\n    gap: 20px;\n  }\n  @media (max-width: 760px) { .scope-grid { grid-template-columns: 1fr; } }\n\n  .scope-card {\n    background: var(--bg);\n    border-radius: 22px;\n    padding: 40px;\n    border: 1px solid var(--line-soft);\n    transition: transform 0.4s cubic-bezier(.2,.8,.2,1), box-shadow 0.4s;\n  }\n  .section.alt .scope-card { background: var(--bg); }\n  .scope-card:hover {\n    transform: translateY(-4px);\n    box-shadow: 0 18px 40px -20px rgba(0,0,0,0.12);\n  }\n\n  .scope-icon {\n    width: 44px;\n    height: 44px;\n    border-radius: 12px;\n    background: var(--accent-soft);\n    color: var(--accent);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    margin-bottom: 22px;\n  }\n  .scope-icon svg { width: 22px; height: 22px; }\n\n  .scope-card h3 {\n    font-size: 24px;\n    font-weight: 600;\n    line-height: 1.2;\n    letter-spacing: -0.02em;\n    color: var(--ink);\n    margin-bottom: 10px;\n  }\n  .scope-card p {\n    font-size: 15px;\n    color: var(--gray);\n    line-height: 1.55;\n    margin-bottom: 22px;\n    letter-spacing: -0.005em;\n  }\n  .scope-list {\n    list-style: none;\n    display: flex;\n    flex-direction: column;\n    gap: 10px;\n  }\n  .scope-list li {\n    font-size: 14px;\n    color: var(--ink-2);\n    padding-left: 24px;\n    position: relative;\n    line-height: 1.5;\n  }\n  .scope-list li::before {\n    content: \"\";\n    position: absolute;\n    left: 0;\n    top: 8px rder-radius: 28px;\n    padding: 40px 48px;\n    border: 1px solid var(--line-soft);\n    margin-top: 20px;\n    display: grid;\n    grid-template-columns: 1.1fr 1fr;\n    gap: 40px;\n    align-items: center;\n  }\n  @media (max-width: 760px) {\n    .hosting-card { grid-template-columns: 1fr; padding: 32px 28px; gap: 24px; }\n  }\n  .hosting-left .hosting-eyebrow {\n    font-size: 12px;\n    font-weight: 600;\n    color: var(--accent);\n    text-transform: uppercase;\n    letter-spacing: 0.06em;\n    margin-bottom: 12px;\n  }\n  .hosting-left h3 {\n    font-size: 26px;\n    font-weight: 600;\n    line-height: 1.2;\n    letter-spacing: -0.025em;\n    color: var(--ink);\n    margin-bottom: 10px;\n  }\n  .hosting-left p {\n    font-size: 14px;\n    color: var(--gray);\n    line-height: 1.55;\n    margin-bottom: 16px;\n  }\n  .hosting-price {\n    display: flex;\n    align-items: baseline;\n    gap: 8px;\n    flex-wrap: wrap;\n  }\n  .hosting-price .big {\n    font-size: 36px;\n    font-weight: 700;\n    letter-spacing: -0.03em;\n    color: var(--ink);\n    line-height: 1;\n  }\n  .hosting-price .cur {\n    font-size: 16px;\n    font-weight: 500;\n    color: var(--gray);\n    margin-right: 4px;\n  }\n  .hosting-price .cadence {\n    font-size: 13px;\n    color: var(--gray);\n    margin-left: 4px;\n  }\n  .hosting-note {\n    margin-top: 10px;\n    font-size: 12px;\n    color: var(--gray);\n  }\n  .hosting-features {\n    list-style: none;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 12px;\n  }\n  @media (max-width: 500px) { .hosting-features { grid-template-columns: 1fr; } }\n  .hosting-features li {\n    font-size: 13px;\n    color: var(--ink-2);\n    padding-left: 22px;\n    position: relative;\n    line-height: 1.5;\n  }\n  .hosting-features li::before {\n    content: \"\";\n    position: absolute;\n    left: 0;\n    top: 5px;\n    width: 14px;\n    height: 14px;\n    border-radius: 50%;\n    background: var(--accent);\n  }\n  .hosting-features
